services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://0.0.0.0:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
